<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Task</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="login-container">

  <h1>Add Task</h1>

  <!-- Task Title -->
  <input type="text" placeholder="Title" id="taskTitle">

  <!-- Class dropdown, new addition to the code. allows for us to select task for the classes that are listed -->
  <select id="taskClass">
    <option value="">Select a Class</option>
  </select>

  <!-- Due Date -->
  <input type="date" id="taskDate">

  <!-- Priority -->
  <select id="taskPriority">
    <option value="">Priority</option>
    <option value="High">High</option>
    <option value="Medium">Medium</option>
    <option value="Low">Low</option>
  </select>

  <!-- Save Button -->
  <button onclick="saveTask()">Save Task</button>

  <!-- Back Link -->
  <p class="register-link">
    <span onclick="goToTasks()" style="cursor:pointer; color:blue;">
      ← Back to Tasks
    </span>
  </p>

  <!-- Message -->
  <p id="taskMessage"></p>

</div>

<script src="app.js"></script>

<script>
  // Load classes into dropdown when page opens
  loadClassesForTaskCreation();
</script>

</body>
</html>
