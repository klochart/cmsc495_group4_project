<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="dashboard-page">

    <div class="sidebar">
      <h2 class="logo">Study Planner</h2>

      <ul class="nav-links">
        <li><a href="dashboard.html" class="active">Dashboard</a></li>
        <li><a href="classes-page.html">Classes</a></li>
        <li><a href="task-list.html">Tasks</a></li>
        <li><a href="calendar.html">Calendar</a></li>
        <li><a href="reminders.html">Reminders</a></li>
      </ul>

      <button class="logout-btn" type="button" onclick="logout()">Log Out</button>
    </div>

    <div class="main-content">
      <h1 id="welcome-message">Welcome back</h1>

      <div class="summary-cards">
        <div class="dashboard-box">
          <h2>Total Classes</h2>
          <p id="total-classes">0</p>
        </div>

        <div class="dashboard-box">
          <h2>Total Tasks</h2>
          <p id="total-tasks">0</p>
        </div>

        <div class="dashboard-box">
          <h2>Due This Week</h2>
          <p id="due-this-week">0</p>
        </div>
      </div>

      <div class="dashboard-box">
        <h2>Upcoming Tasks</h2>
        <ul id="upcoming-tasks"></ul>
      </div>

      <div class="dashboard-box">
        <h2>Priority Tasks</h2>
        <ul id="priority-tasks"></ul>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
