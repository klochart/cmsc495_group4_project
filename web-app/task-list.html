<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="dashboard-page">

    <div class="sidebar">
      <h2 class="logo">Study Planner</h2>

      <ul class="nav-links">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="classes-page.html">Classes</a></li>
        <li><a href="task-list.html" class="active">Tasks</a></li>
        <li><a href="calendar.html">Calendar</a></li>
        <li><a href="reminders.html">Reminders</a></li>
      </ul>

      <button class="logout-btn" onclick="logout()">Log Out</button>
    </div>

    <div class="main-content">
      <h1>Tasks</h1>

      <div class="dashboard-box">
        <button type="button" onclick="goToAddTask()">Add New Task</button>
      </div>

      <div class="dashboard-box">
        <h2>Your Tasks</h2>

        <!-- wrapping the table helps keep the layout clean on smaller screens -->
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Title</th>
                <th>Class</th>
                <th>Due Date</th>
                <th>Priority</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="taskTableBody">
              <!-- tasks get inserted here by app.js -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
