<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="login-container">
    <h1>Student Study Planner</h1>
    <h2>Forgot Password</h2>

    <input type="email" placeholder="Enter your email" id="resetEmail">

    <button onclick="sendResetLink()">Send Reset Link</button>

    <p class="register-link">
      Remember your password? <span onclick="goToLogin()">Back to Sign In</span>
    </p>

    <p id="resetMessage"></p>
  </div>

  <script src="app.js"></script>
</body>
</html>
