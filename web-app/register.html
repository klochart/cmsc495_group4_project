<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="login-container">
    <h1>Create Account</h1>

    <input type="text" id="registerUsername" placeholder="Username">

    <input type="password" id="registerPassword" placeholder="Password">

    <!-- Show password toggle -->
    <label>
      <input type="checkbox" onclick="toggleRegisterPassword()"> Show Password
    </label>

    <!-- type="button" keeps the page from auto-submitting before JS finishes -->
    <button type="button" onclick="registerUser(event)">Create Account</button>

    <p class="register-link">
      Already have an account?
      <span onclick="goToLogin()">Back to Login</span>
    </p>

    <p id="registerMessage"></p>
  </div>

  <script src="app.js"></script>
</body>
</html>
